<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMS Movie Portal</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: sans-serif;
            margin: 10px;
            background: #121212;
            color: #e0e0e0;
            font-size: 14px;
        }
        h1 {
            color: #bb86fc;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .movie {
            background: #1e1e1e;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            border-left: 3px solid #bb86fc;
        }
        .movie a {
            text-decoration: none;
            color: #03dac6;
            font-size: 1em;
        }
        .movie a:hover {
            text-decoration: underline;
        }
        .path {
            font-size: 0.8em;
            color: #888;
            margin-top: 3px;
            word-break: break-all;
        }
        .count {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 10px;
        }
        #loading {
            color: #bb86fc;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>PMS Movie Portal</h1>
    <div id="loading">Scanning movies...</div>
    <div id="content" style="display:none;">
        <div class="count" id="count"></div>
        <div id="movies"></div>
    </div>
    <script>
        const BASE = '/movies/';
        const MAX_DEPTH = 3;
        const videoExts = ['.mp4', '.mkv', '.avi'];
        let movies = [];

        function cleanHref(href) {
            let cleaned = href.split('?')[0].split('#')[0];
            try {
                cleaned = decodeURIComponent(cleaned);
            } catch (e) {}
            return cleaned;
        }

        async function fetchDir(path, depth) {
            try {
                const response = await fetch(path, { credentials: 'omit' });
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const table = doc.getElementById('files');
                if (!table) return;
                const rows = table.querySelectorAll('tbody tr');
                for (const row of rows) {
                    const link = row.querySelector('a');
                    if (!link) continue;
                    const href = link.getAttribute('href');
                    if (!href) continue;
                    const cleanedHref = cleanHref(href);
                    const isDir = cleanedHref.endsWith('/');
                    const name = isDir ? cleanedHref.slice(0, -1) : cleanedHref;
                    const basePath = path.endsWith('/') ? path : path + '/';
                    const newPath = basePath + cleanedHref;
                    if (isDir && depth < MAX_DEPTH) {
                        await fetchDir(newPath, depth + 1);
                    } else if (!isDir) {
                        const ext = name.substring(name.lastIndexOf('.')).toLowerCase();
                        if (videoExts.includes(ext)) {
                            movies.push({
                                name: name,
                                path: newPath,
                                dir: path.replace(BASE, '')
                            });
                        }
                    }
                }
            } catch (e) {
                // silently ignore errors
            }
        }

        function render() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            const countEl = document.getElementById('count');
            const moviesEl = document.getElementById('movies');
            loading.style.display = 'none';
            content.style.display = 'block';
            countEl.textContent = 'Found ' + movies.length + ' movies';
            movies.sort((a, b) => a.name.localeCompare(b.name));
            moviesEl.innerHTML = '';
            for (const m of movies) {
                const div = document.createElement('div');
                div.className = 'movie';
                const link = document.createElement('a');
                link.href = m.path;
                link.target = '_blank';
                link.textContent = m.name;
                const pathDiv = document.createElement('div');
                pathDiv.className = 'path';
                pathDiv.textContent = m.dir + m.name;
                div.appendChild(link);
                div.appendChild(pathDiv);
                moviesEl.appendChild(div);
            }
        }

        fetchDir(BASE, 0).then(render);
    </script>
</body>
</html>
