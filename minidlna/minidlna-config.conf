# MiniDLNA configuration for PMS
port=8200

# media directories
media_dir=V,/data/data/com.termux/files/home/storage/internal/server/movie-linked

# database and log directories
db_dir=/data/data/com.termux/files/home/storage/internal/server/configs/minidlna/db
log_dir=/data/data/com.termux/files/home/storage/internal/server/configs/minidlna/log

# allow symlinks that point outside media_dir (since we use bind mounts)
wide_links=yes

# friendly name for the server
friendly_name=PMS DLNA

# other settings
inotify=yes
notify_interval=120
serial=12345678
model_number=1
strict_dlna=no
enable_tivo=no
tivo_discovery=bonjour
album_art_names=Cover.jpg/cover.jpg/AlbumArtSmall.jpg/albumartsmall.jpg/AlbumArt.jpg/albumart.jpg/Album.jpg/album.jpg/Folder.jpg/folder.jpg/Thumb.jpg/thumb.jpg
