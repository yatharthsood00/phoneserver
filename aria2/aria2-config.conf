# aria2 configuration for pms

# Temporary directory for incomplete downloads (outside any served path)
dir=/data/data/com.termux/files/home/storage/internal/server/new_downloads

# Fastest on flash
file-allocation=none

# Resume interrupted downloads
continue=true
max-concurrent-downloads=5

# Per‑download connection settings
max-connection-per-server=8
min-split-size=2M
split=8

# Persistence – session file still tracks *incomplete* downloads only
input-file=/data/data/com.termux/files/home/storage/internal/server/configs/aria2/session/aria2.session
save-session=/data/data/com.termux/files/home/storage/internal/server/configs/aria2/session/aria2.session
save-session-interval=30

# BitTorrent
bt-save-metadata=false
bt-enable-lpd=true
bt-max-peers=100
bt-request-peer-speed-limit=1M

# Seed forever - no can do
seed-ratio=0
seed-time=0
follow-torrent=true

# RPC (needed for the post‑download script)
enable-rpc=true
rpc-listen-all=true
rpc-listen-port=6800
rpc-allow-origin-all=true


